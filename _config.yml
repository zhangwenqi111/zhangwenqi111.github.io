# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# ==============================================
# 🔴 基本站点设置（已根据你的文档完成修改）
# ==============================================
locale                   : "zh-CN"  # 改为中文语言
site_theme               : "default" # 可选："default", "air", "sunrise", "mint", "dirt", "contrast"
title                    : "北京师范大学李安婕课题组"
title_separator          : "-"
name                     : &name "北京师范大学李安婕课题组"
description              : &description "专注于废水生物处理、生物能源、小流域污染修复及水环境微生物过程研究"
url                      : "https://zhangwenqi111.github.io" # 你的GitHub Pages地址
baseurl                  : "" # 根域名部署，保持空
repository               : "zhangwenqi111/zhangwenqi111.github.io" # 你的仓库地址

# ==============================================
# 🟠 侧边栏作者信息（已根据你的文档完成修改）
# ==============================================
author:
  # 个人基本信息
  avatar           : "profile.png" # 后续上传李安婕老师照片到/images文件夹替换
  name             : "李安婕"
  pronouns         : "她/她"
  bio              : "副教授，博士生导师，北京师范大学励耘优秀青年教师。主要从事废水生物处理新技术、生物能源及剩余污泥资源化、小流域污染治理及微生物修复技术研究。"
  location         : "北京市海淀区新街口外大街19号"
  employer         : "北京师范大学环境学院"
  uri              : ""
  email            : "liaj@bnu.edu.cn" # 文档中的官方邮箱

# ==============================================
# 🟡 出版物分类（已根据你的文档调整）
# ==============================================
publication_category:
  books:
    title: '专著与教材' # 原books改为专著与教材，对应文档中的1部英文教材和2部专著
  manuscripts:
    title: '期刊论文'    
  conferences:
    title: '会议论文'
  patents:
    title: '授权专利' # 新增专利分类，对应文档中的9项授权专利

# ==============================================
# 🟢 站点通用设置
# ==============================================
teaser                   :  # 后续上传课题组logo到/images文件夹
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# 关闭所有评论功能（学术网站不需要）
comments:
  provider               : false
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :

staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  hide                   : true # 隐藏RSS订阅
  path                   :

# ==============================================
# 🔵 SEO与统计（不需要，全部留空）
# ==============================================
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

social:
  type                   : "Organization" # 改为组织类型
  name                   : "北京师范大学李安婕课题组"
  links: []

analytics:
  provider               : "false"
  google:
    tracking_id          :

# ==============================================
# 🟣 文件读取设置
# ==============================================
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ==============================================
# 🟤 Markdown处理设置
# ==============================================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ==============================================
# 🟪 内容集合（✅ 新增学习资源模块，格式与论文一致）
# ==============================================
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  resources: # ✅ 新增学习资源集合
    output: true
    permalink: /:collection/:path/

# ==============================================
# 🟫 默认页面配置（✅ 为学习资源添加默认配置）
# ==============================================
defaults:
  # _posts（新闻动态）
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false # 关闭阅读时间
      comments: false
      share: false # 关闭分享
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _publications（发表论文）
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comment: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false
  # ✅ _resources（学习资源，与论文格式完全一致）
  - scope:
      path: ""
      type: resources
    values:
      layout: single
      author_profile: true
      share: false
      comments: false

# ==============================================
# ⬛ 样式与输出设置
# ==============================================
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: "Asia/Shanghai" # ✅ 改为中国时区

# ==============================================
# ⬜ 插件设置
# ==============================================
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# ==============================================
# 🔳 归档设置
# ==============================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ==============================================
# 🔲 HTML压缩设置
# ==============================================
compress_html:
  clippings: all
  ignore:
    envs: development
